<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets IA</title>
    <meta name="description" content="Portfolio de projets avancés en Intelligence Artificielle">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loader -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>Chargement des projets IA...</p>
    </div>

    <!-- Header -->
    <header class="header" id="header">
        <div class="header-content">
            <h1>Projets IA Avancés</h1>
            <p>Réalisations en Intelligence Artificielle</p>
            <div class="header-underline"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">
                <span class="btn-icon"><i class="fas fa-layer-group"></i></span>
                <span>Tous</span>
            </button>
            <button class="filter-btn" data-filter="vision">
                <span class="btn-icon"><i class="fas fa-eye"></i></span>
                <span>Vision</span>
            </button>
            <button class="filter-btn" data-filter="nlp">
                <span class="btn-icon"><i class="fas fa-comment-dots"></i></span>
                <span>NLP</span>
            </button>
            <button class="filter-btn" data-filter="data">
                <span class="btn-icon"><i class="fas fa-chart-line"></i></span>
                <span>Data</span>
            </button>
            <button class="filter-btn" data-filter="robot">
                <span class="btn-icon"><i class="fas fa-robot"></i></span>
                <span>Robotique</span>
            </button>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid"></div>
    </main>

    <!-- Floating Nav -->
    <nav class="floating-nav">
        <button class="nav-btn theme-btn" aria-label="Thème">
            <i class="fas fa-moon"></i>
        </button>
        <a href="../../src/accueil/index.html" class="nav-btn" aria-label="Accueil">
            <i class="fas fa-home"></i>
        </a>
    </nav>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; <span id="current-year"></span> Hassan TOUAYOUCH</p>
            <div class="social-links">
                <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
